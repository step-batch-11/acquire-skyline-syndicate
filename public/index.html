<!DOCTYPE html>
<html lang="en">

<head>
  <title>ACQUIRE</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>

  <header>
    <h1>ACQUIRE</h1>
    <p class="tagline">Build Empires. Acquire Corporations. Dominate the Market.</p>
  </header>

  <section class="login-container">
    <form action="/lobby/join" method="post" class="login-form">
      <label for="player_name">ENTER PLAYER NAME :</label>
      <input type="text" name="player_name" id="player_name" placeholder="Unique Name" required>
      <button type="submit">Join Lobby</button>
    </form>
  </section>

</body>

</html>
