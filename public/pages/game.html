<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Basic layout</title>
    <link rel="stylesheet" href="../styles/game.css" />
    <script type="module" src="../js/game.js"></script>
    <template id="board-tile">
      <div class="tile"><p>1a</p></div>
    </template>
  </head>
  <body>
    <main>
      <div class="market-notification-players">
        <div class="notification-box"></div>
        <div class="player-market">
          <div class="players">
            <div class="player" id="player-1"></div>
            <div class="player" id="player-2"></div>
            <div class="player" id="player-3"></div>
            <div class="player" id="player-4"></div>
            <div class="player" id="player-5"></div>
            <div class="player" id="player-6"></div>
          </div>
          <div class="board"></div>
        </div>
      </div>
      <div class="bank">
        <h1>Bank Section</h1>
      </div>
    </main>
    <footer>
      <div class="amount-container">
        <p></p>
      </div>
      <div class="stocks">
        <div class="stock"></div>
        <div class="stock"></div>
        <div class="stock"></div>
        <div class="stock"></div>
        <div class="stock"></div>
        <div class="stock"></div>
        <div class="stock"></div>
      </div>
      <div class="tiles"></div>
    </footer>
  </body>
</html>
